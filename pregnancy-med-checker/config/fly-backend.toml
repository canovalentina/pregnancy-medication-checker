# Fly.io configuration for Backend API
app = "pregnancy-backend"
primary_region = "iad"  # US East (same region as HAPI FHIR)

[build]
  image = "canovalentina/pregnancy-backend:latest"

[env]
  PORT = "8000"
  APP_NAME = "Pregnancy Medication Checker API"
  API_PREFIX = "/api"
  FHIR_APP_ID = "pregnancy-med-checker"
  FHIR_TIMEOUT = "30"
  LOG_LEVEL = "INFO"
  FHIR_SERVER_URL = "http://hapi.fhir.org/baseR4"
  ENABLE_CORS_ORIGINS = "http://localhost:5173,https://pregnancy-med-checker.vercel.app,https://www.pregsafe.org"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"  # Suspend instead of stop for faster wake-up. Set to true for free tier
  auto_start_machines = true
  min_machines_running = 1  # Keep at least 1 machine running to avoid cold starts, for free tier set to 0
  
  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    grace_period = "60s"
    interval = "15s"
    restart_limit = 0
    timeout = "10s"

  [[services.http_checks]]
    interval = "30s"
    grace_period = "60s"
    method = "get"
    path = "/api/health"
    protocol = "http"
    timeout = "10s"
    tls_skip_verify = false

# Memory and CPU allocation
[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

